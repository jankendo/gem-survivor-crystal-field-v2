name: Build Windows and iOS

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      full_test:
        description: "Run full long tests"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

env:
  GODOT_VERSION: "4.2-stable"
  TEMPLATE_VERSION: "4.2.stable"
  PROJECT_NAME: "GemSurvivor"
  IOS_PRESET: "iOS"
  WINDOWS_PRESET: "Windows Desktop"
  EXPORT_NAME: "ChronoMergeTactics"

jobs:
  windows-build:
    runs-on: windows-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - name: Download Godot and export templates
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path .tools | Out-Null
          Invoke-WebRequest "https://github.com/godotengine/godot-builds/releases/download/${env:GODOT_VERSION}/Godot_v${env:GODOT_VERSION}_win64.exe.zip" -OutFile ".tools/godot.zip"
          Invoke-WebRequest "https://github.com/godotengine/godot-builds/releases/download/${env:GODOT_VERSION}/Godot_v${env:GODOT_VERSION}_export_templates.tpz" -OutFile ".tools/templates.zip"
          Expand-Archive ".tools/godot.zip" ".tools/godot" -Force
          Expand-Archive ".tools/templates.zip" ".tools/templates" -Force
          $templateDir = Join-Path $env:APPDATA "Godot/export_templates/${env:TEMPLATE_VERSION}"
          New-Item -ItemType Directory -Force -Path $templateDir | Out-Null
          Copy-Item ".tools/templates/templates/*" $templateDir -Recurse -Force

      - name: Validate workflow and presets
        run: |
          python tools/validate_github_actions.py
          python tools/validate_ios_workflow.py
          python tools/validate_v2_asset_manifest.py

      - name: Run standard tests
        shell: pwsh
        run: |
          $godot = (Get-ChildItem ".tools/godot/Godot_v${env:GODOT_VERSION}_win64_console.exe" | Select-Object -First 1).FullName
          & $godot --headless --editor --path . --quit-after 1000
          & $godot --headless --path . --check-only --script res://tests/test_runner.gd
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          & $godot --headless --path . --script res://tests/test_runner.gd
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          python tools/inspect_ios_layout.py
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          & $godot --headless --path . --script res://tests/auto_play_60sec.gd
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          & $godot --headless --path . --script res://tests/auto_play_ios_touch_60sec.gd
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          & $godot --headless --path . --script res://tests/auto_play_balance_candidate_audit.gd
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          & $godot --headless --path . --script res://tests/auto_play_shop_reroll_flow.gd
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          python tools/generate_progress_qa.py
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          python tools/generate_safe_play_area_qa.py
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          python tools/generate_exploration_balance_report.py
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          python tools/generate_candidate_pool_qa.py
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          python tools/validate_generated_assets.py
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          python tools/generate_ui_redesign_qa.py
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          python tools/generate_field_equipment_qa.py
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          python tools/generate_shop_reroll_qa.py
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          python tools/generate_experience_balance_report.py
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          python tools/generate_persistent_drop_qa.py
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          python tools/generate_global_gem_collection_qa.py
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          python tools/generate_character_evolution_qa.py
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          python tools/generate_knockback_qa.py
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          & $godot --headless --path . --script res://tests/auto_play_v2_momentum_10min.gd
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          & $godot --headless --path . --script res://tests/capture_v2_phase2_screenshots.gd
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Run full balance tests
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.full_test == 'true' }}
        shell: pwsh
        run: |
          $godot = (Get-ChildItem ".tools/godot/Godot_v${env:GODOT_VERSION}_win64_console.exe" | Select-Object -First 1).FullName
          $scripts = @(
            "res://tests/auto_play_10min.gd",
            "res://tests/auto_play_30min_balance.gd",
            "res://tests/auto_play_balance_ranged_10min.gd",
            "res://tests/auto_play_balance_melee_10min.gd",
            "res://tests/auto_play_balance_lightning_10min.gd",
            "res://tests/auto_play_balance_poison_10min.gd",
            "res://tests/auto_play_balance_explosion_10min.gd",
            "res://tests/auto_play_balance_deploy_10min.gd",
            "res://tests/auto_play_balance_gem_10min.gd",
            "res://tests/auto_play_ios_touch_60sec.gd",
            "res://tests/auto_play_ios_touch_5min.gd",
            "res://tests/auto_play_ios_levelup_selection.gd",
            "res://tests/auto_play_ios_menu_flow.gd",
            "res://tests/auto_play_ios_layout_qa.gd",
            "res://tests/auto_play_ios_pause_scroll_flow.gd",
            "res://tests/auto_play_ios_full_ui_flow.gd",
            "res://tests/auto_play_ios_perf_10min.gd",
            "res://tests/auto_play_ios_perf_20min.gd",
            "res://tests/auto_play_ios_perf_30min.gd",
            "res://tests/auto_play_wall_slide_5min.gd",
            "res://tests/auto_play_disabled_pool_10min.gd",
            "res://tests/auto_play_balance_disabled_pool_10min.gd",
            "res://tests/auto_play_skip_seal_10min.gd",
            "res://tests/auto_play_exploration_reward_15min.gd",
            "res://tests/auto_play_event_motivation_15min.gd",
            "res://tests/auto_play_field_equipment_pickups_15min.gd",
            "res://tests/auto_play_knockback_wall_10min.gd",
            "res://tests/auto_play_map_pause_10min.gd",
            "res://tests/auto_play_result_status_ui_flow.gd",
            "res://tests/auto_play_ios_lightweight_energy_20min.gd",
            "res://tests/auto_play_camping_vs_exploration_20min.gd",
            "res://tests/auto_play_exp_curve_30min.gd",
            "res://tests/auto_play_global_collection_ios_stress_20min.gd",
            "res://tests/auto_play_all_character_evolution_conditions.gd",
            "res://tests/auto_play_exp_balance_10min.gd",
            "res://tests/auto_play_resonance_magnet_balance_15min.gd",
            "res://tests/auto_play_global_gem_collection_balance_20min.gd",
            "res://tests/auto_play_random_field_equipment_balance_20min.gd"
          )
          foreach ($script in $scripts) {
            & $godot --headless --path . --script $script
            if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          }
          python tools/analyze_ios_performance.py test-output/ios_performance_log.csv --output test-output/ios_performance_report.md
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Generate balance report
        run: python tools/analyze_balance.py --candidate-runs test-output/balance_candidate_runs.json --output balance_report.md

      - name: Export Windows release
        shell: pwsh
        run: |
          $godot = (Get-ChildItem ".tools/godot/Godot_v${env:GODOT_VERSION}_win64_console.exe" | Select-Object -First 1).FullName
          New-Item -ItemType Directory -Force -Path builds/windows | Out-Null
          & $godot --headless --path . --export-release "${env:WINDOWS_PRESET}" "builds/windows/${env:EXPORT_NAME}.exe"
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          $exePath = "builds/windows/${env:EXPORT_NAME}.exe"
          if (-not (Test-Path $exePath)) { throw "Windows export was not created." }
          if ((Get-Item $exePath).Length -lt 1MB) { throw "Windows export is unexpectedly small." }
          Copy-Item README.md builds/windows/README.md -Force
          Push-Location builds/windows
          Compress-Archive -Path "${env:EXPORT_NAME}.exe", "README.md" -DestinationPath "..\ChronoMergeTactics-Windows.zip" -Force
          Pop-Location
          if (-not (Test-Path "builds/ChronoMergeTactics-Windows.zip")) { throw "Windows archive was not created." }
          if ((Get-Item "builds/ChronoMergeTactics-Windows.zip").Length -lt 1MB) { throw "Windows archive is unexpectedly small." }

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: ChronoMergeTactics-Windows
          path: builds/ChronoMergeTactics-Windows.zip
          if-no-files-found: error

      - name: Upload balance report
        uses: actions/upload-artifact@v4
        with:
          name: Balance-Report
          path: |
            balance_report.md
            test-output/balance_candidate_runs.json
          if-no-files-found: warn

      - name: Upload iOS energy report
        uses: actions/upload-artifact@v4
        with:
          name: iOS-Energy-Report
          path: |
            test-output/ios_energy_log_standard.csv
            test-output/ios_energy_log_standard_summary.json
            test-output/ios_energy_log_battery_saver.csv
            test-output/ios_energy_log_battery_saver_summary.json
            test-output/ios_energy_report.md
          if-no-files-found: warn

      - name: Upload progress QA report
        uses: actions/upload-artifact@v4
        with:
          name: Progress-QA-Report
          path: test-output/progress_qa_report.md
          if-no-files-found: warn

      - name: Upload iOS layout QA
        uses: actions/upload-artifact@v4
        with:
          name: iOS-Layout-QA
          path: test-output/screenshots/ios_layout/
          if-no-files-found: warn

      - name: Upload iOS touch audit
        uses: actions/upload-artifact@v4
        with:
          name: iOS-Touch-Audit
          path: test-output/ios_touch_action_audit.csv
          if-no-files-found: warn

      - name: Upload iOS performance report
        uses: actions/upload-artifact@v4
        with:
          name: iOS-Performance-Report
          path: |
            test-output/ios_perf_5min.csv
            test-output/ios_performance_log*.csv
            test-output/ios_performance_report.md
          if-no-files-found: warn

      - name: Upload Safe Play Area QA
        uses: actions/upload-artifact@v4
        with:
          name: Safe-Play-Area-QA
          path: test-output/safe_play_area_qa.md
          if-no-files-found: warn

      - name: Upload exploration balance report
        uses: actions/upload-artifact@v4
        with:
          name: Exploration-Balance-Report
          path: test-output/exploration_balance_report.md
          if-no-files-found: warn

      - name: Upload candidate pool QA
        uses: actions/upload-artifact@v4
        with:
          name: Candidate-Pool-QA
          path: test-output/candidate_pool_qa.md
          if-no-files-found: warn

      - name: Upload asset QA report
        uses: actions/upload-artifact@v4
        with:
          name: Asset-QA-Report
          path: test-output/asset_qa_report.md
          if-no-files-found: warn

      - name: Upload UI redesign QA
        uses: actions/upload-artifact@v4
        with:
          name: UI-Redesign-QA
          path: test-output/ui_redesign_qa.md
          if-no-files-found: warn

      - name: Upload field equipment QA
        uses: actions/upload-artifact@v4
        with:
          name: Field-Equipment-QA
          path: test-output/field_equipment_qa.md
          if-no-files-found: warn

      - name: Upload selection reroll QA
        uses: actions/upload-artifact@v4
        with:
          name: Selection-Reroll-QA
          path: test-output/shop_reroll_qa.md
          if-no-files-found: warn

      - name: Upload experience balance report
        uses: actions/upload-artifact@v4
        with:
          name: Experience-Balance-Report
          path: test-output/experience_balance_report.md
          if-no-files-found: warn

      - name: Upload persistent drop QA
        uses: actions/upload-artifact@v4
        with:
          name: Persistent-Drop-QA
          path: test-output/persistent_drop_qa.md
          if-no-files-found: warn

      - name: Upload global gem collection QA
        uses: actions/upload-artifact@v4
        with:
          name: Global-Gem-Collection-QA
          path: test-output/global_gem_collection_qa.md
          if-no-files-found: warn

      - name: Upload character evolution QA
        uses: actions/upload-artifact@v4
        with:
          name: Character-Evolution-QA
          path: test-output/character_evolution_qa.md
          if-no-files-found: warn

      - name: Upload knockback QA
        uses: actions/upload-artifact@v4
        with:
          name: Knockback-QA
          path: test-output/knockback_qa.md
          if-no-files-found: warn

      - name: Upload v2 phase 2 QA
        uses: actions/upload-artifact@v4
        with:
          name: V2-Phase2-QA
          path: |
            test-output/v2_momentum_balance_report.md
            test-output/v2_momentum_balance_summary.json
            test-output/screenshots/v2_phase2/
          if-no-files-found: warn

  ios-unsigned-build:
    runs-on: macos-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - name: Download Godot and export templates
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p .tools/godot .tools/templates
          curl -fL "https://github.com/godotengine/godot-builds/releases/download/${GODOT_VERSION}/Godot_v${GODOT_VERSION}_macos.universal.zip" -o .tools/godot.zip
          curl -fL "https://github.com/godotengine/godot-builds/releases/download/${GODOT_VERSION}/Godot_v${GODOT_VERSION}_export_templates.tpz" -o .tools/templates.zip
          ditto -x -k .tools/godot.zip .tools/godot
          ditto -x -k .tools/templates.zip .tools/templates
          TEMPLATE_DIR="${HOME}/Library/Application Support/Godot/export_templates/${TEMPLATE_VERSION}"
          mkdir -p "${TEMPLATE_DIR}"
          cp -R .tools/templates/templates/. "${TEMPLATE_DIR}/"
          chmod +x .tools/godot/Godot.app/Contents/MacOS/Godot

      - name: Validate iOS workflow
        run: |
          python3 tools/validate_github_actions.py
          python3 tools/validate_ios_workflow.py
          python3 tools/validate_v2_asset_manifest.py

      - name: Export iOS Xcode project
        shell: bash
        run: |
          set -euo pipefail
          GODOT=".tools/godot/Godot.app/Contents/MacOS/Godot"
          mkdir -p builds/ios-export
          "${GODOT}" --headless --path . --export-release "${IOS_PRESET}" "builds/ios-export/${PROJECT_NAME}.ipa"
          find builds/ios-export -maxdepth 2 -print
          test -n "$(find builds/ios-export -maxdepth 1 -name '*.xcodeproj' -print -quit)"

      - name: Build unsigned iOS app
        shell: bash
        run: |
          set -euo pipefail
          XCODEPROJ="$(find builds/ios-export -maxdepth 1 -name '*.xcodeproj' -print -quit)"
          echo "Xcode project: ${XCODEPROJ}"
          xcodebuild -project "${XCODEPROJ}" -list
          SCHEME="$(xcodebuild -project "${XCODEPROJ}" -list -json | python3 -c 'import json,sys; data=json.load(sys.stdin); print((data.get("project", {}).get("schemes") or [""])[0])')"
          if [ -z "${SCHEME}" ]; then
            SCHEME="${PROJECT_NAME}"
          fi
          echo "Scheme: ${SCHEME}"
          rm -rf DerivedData
          xcodebuild \
            -project "${XCODEPROJ}" \
            -scheme "${SCHEME}" \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath DerivedData \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            DEVELOPMENT_TEAM="" \
            build

      - name: Package unsigned IPA
        shell: bash
        run: |
          set -euo pipefail
          APP_PATH="$(find DerivedData/Build/Products -type d -name '*.app' -print -quit)"
          if [ -z "${APP_PATH}" ]; then
            echo "No .app found. Build products:"
            find DerivedData/Build/Products -maxdepth 4 -print
            exit 1
          fi
          rm -rf builds/ios
          mkdir -p builds/ios/Payload
          cp -R "${APP_PATH}" builds/ios/Payload/
          (
            cd builds/ios
            zip -qry GemSurvivor-unsigned.ipa Payload
          )
          test -s builds/ios/GemSurvivor-unsigned.ipa
          unzip -l builds/ios/GemSurvivor-unsigned.ipa | head -80
          echo "This IPA is unsigned. It cannot be installed directly on a normal iPhone."
          echo "Use AltStore, Sideloadly, or your own Apple signing flow."

      - name: Upload unsigned iOS IPA
        uses: actions/upload-artifact@v4
        with:
          name: GemSurvivor-iOS-unsigned-IPA
          path: |
            builds/ios/GemSurvivor-unsigned.ipa
            README.md
            IOS_UNSIGNED_README.md
          if-no-files-found: error
