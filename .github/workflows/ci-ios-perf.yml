name: Phase 8 iOS Performance

on:
  workflow_dispatch:
  push:
    branches:
      - "phase7/**"
      - "phase8/**"
    paths:
      - "scripts/core/SurvivorState.gd"
      - "scripts/systems/WeaponSystem.gd"
      - "scripts/systems/VisualEffect*.gd"
      - "scripts/systems/WeaponRenderStyleCache.gd"
      - "scripts/ui/ArenaView.gd"
      - "data/visual_effect_profiles.json"
      - "data/weapon_effects.json"
      - "tests/Phase7EffectStressHarness.gd"
      - ".github/workflows/ci-ios-perf.yml"
  pull_request:
    branches: [main]
    paths:
      - "scripts/core/SurvivorState.gd"
      - "scripts/systems/WeaponSystem.gd"
      - "scripts/systems/VisualEffect*.gd"
      - "scripts/systems/WeaponRenderStyleCache.gd"
      - "scripts/ui/ArenaView.gd"
      - "data/visual_effect_profiles.json"
      - "data/weapon_effects.json"
      - "tests/Phase7EffectStressHarness.gd"

concurrency:
  group: phase8-perf-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  GODOT_VERSION: "4.7-stable"

jobs:
  phase8-performance:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/cache@v4
        with:
          path: .tools/godot
          key: godot-editor-${{ runner.os }}-${{ env.GODOT_VERSION }}

      - uses: actions/cache@v4
        with:
          path: .godot/imported
          key: godot-imported-${{ runner.os }}-${{ env.GODOT_VERSION }}-${{ hashFiles('project.godot', 'assets/**', 'data/**') }}
          restore-keys: godot-imported-${{ runner.os }}-${{ env.GODOT_VERSION }}-

      - name: Install Godot
        shell: bash
        run: |
          set -euo pipefail
          if [ ! -x ".tools/godot/Godot_v${GODOT_VERSION}_linux.x86_64" ]; then
            mkdir -p .tools/godot
            curl -fL "https://github.com/godotengine/godot-builds/releases/download/${GODOT_VERSION}/Godot_v${GODOT_VERSION}_linux.x86_64.zip" -o /tmp/godot.zip
            unzip -q /tmp/godot.zip -d .tools/godot
            chmod +x ".tools/godot/Godot_v${GODOT_VERSION}_linux.x86_64"
          fi

      - name: Import project
        run: .tools/godot/Godot_v${GODOT_VERSION}_linux.x86_64 --headless --editor --path . --quit-after 1000

      - name: Run Phase 7 performance manifest
        shell: bash
        run: |
          GODOT=".tools/godot/Godot_v${GODOT_VERSION}_linux.x86_64"
          "${GODOT}" --headless --path . --script res://tests/batch_test_runner.gd -- \
            --manifest=res://tests/manifests/phase7_perf.json \
            --output=res://test-output/ci/phase7_perf_timing.json

      - name: Run Phase 8 standard low minimal battery comparison
        shell: bash
        run: |
          GODOT=".tools/godot/Godot_v${GODOT_VERSION}_linux.x86_64"
          "${GODOT}" --headless --path . --script res://tests/auto_play_ios_phase8_extreme_late_game_stress.gd | tee test-output/ci/phase8_perf.log

      - name: Performance summary
        if: always()
        shell: bash
        run: |
          python tools/ci/write_phase7_summary.py \
            test-output/phase7/ci_effect_stress.json \
            test-output/ci/phase7_perf_timing.json \
            "${GITHUB_STEP_SUMMARY}"

      - name: Upload Phase 7 performance summary
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: phase8-performance-summary
          path: |
            test-output/phase7/
            test-output/ci/phase7_perf_timing.json
            test-output/ci/phase8_perf.log
          if-no-files-found: error
          compression-level: 1
