name: Nightly Full Validation

on:
  schedule:
    - cron: "20 17 * * *"
  workflow_dispatch:
  push:
    branches:
      - "phase7/**"
    paths:
      - ".github/workflows/nightly-full.yml"
      - "tests/manifests/nightly_full.json"

env:
  GODOT_VERSION: "4.7-stable"

jobs:
  full-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    strategy:
      fail-fast: false
      max-parallel: 14
      matrix:
        include:
          - shard: unit
            scripts: test_runner.gd
          - shard: core-long
            scripts: auto_play_10min.gd,auto_play_30min_balance.gd
          - shard: weapons
            scripts: auto_play_balance_ranged_10min.gd,auto_play_balance_melee_10min.gd,auto_play_balance_lightning_10min.gd,auto_play_balance_poison_10min.gd,auto_play_balance_explosion_10min.gd,auto_play_balance_deploy_10min.gd,auto_play_balance_gem_10min.gd
          - shard: ios-ui
            scripts: auto_play_ios_touch_60sec.gd,auto_play_ios_touch_5min.gd,auto_play_ios_levelup_selection.gd,auto_play_ios_menu_flow.gd,auto_play_ios_layout_qa.gd,auto_play_ios_pause_scroll_flow.gd,auto_play_ios_full_ui_flow.gd
          - shard: ios-perf-10
            scripts: auto_play_ios_perf_10min.gd
          - shard: ios-perf-20
            scripts: auto_play_ios_perf_20min.gd
          - shard: ios-perf-30
            scripts: auto_play_ios_perf_30min.gd
          - shard: ios-energy
            scripts: auto_play_ios_lightweight_energy_20min.gd
          - shard: gameplay
            scripts: auto_play_wall_slide_5min.gd,auto_play_disabled_pool_10min.gd,auto_play_balance_disabled_pool_10min.gd,auto_play_skip_seal_10min.gd,auto_play_exploration_reward_15min.gd,auto_play_event_motivation_15min.gd,auto_play_field_equipment_pickups_15min.gd,auto_play_knockback_wall_10min.gd,auto_play_map_pause_10min.gd,auto_play_result_status_ui_flow.gd
          - shard: progression
            scripts: auto_play_camping_vs_exploration_20min.gd,auto_play_exp_curve_30min.gd,auto_play_global_collection_ios_stress_20min.gd,auto_play_all_character_evolution_conditions.gd,auto_play_exp_balance_10min.gd,auto_play_resonance_magnet_balance_15min.gd,auto_play_global_gem_collection_balance_20min.gd,auto_play_random_field_equipment_balance_20min.gd
          - shard: environment
            scripts: auto_play_environment_windows_high_10min.gd,auto_play_item_placement_environment_30min.gd,auto_play_phase5_ios_10min.gd
          - shard: density-30
            scripts: auto_play_phase5_density_30min.gd
          - shard: density-35
            scripts: auto_play_phase7_density_35min.gd
          - shard: density-40
            scripts: auto_play_phase7_density_40min.gd
          - shard: density-45
            scripts: auto_play_phase5_density_45min.gd
          - shard: density-50
            scripts: auto_play_phase7_density_50min.gd
          - shard: density-55
            scripts: auto_play_phase7_density_55min.gd
          - shard: density-60
            scripts: auto_play_phase5_density_60min.gd
    steps:
      - uses: actions/checkout@v4

      - uses: actions/cache@v4
        with:
          path: .tools/godot
          key: godot-editor-${{ runner.os }}-${{ env.GODOT_VERSION }}

      - uses: actions/cache@v4
        with:
          path: .godot/imported
          key: godot-imported-${{ runner.os }}-${{ env.GODOT_VERSION }}-${{ hashFiles('project.godot', 'assets/**', 'data/**') }}
          restore-keys: godot-imported-${{ runner.os }}-${{ env.GODOT_VERSION }}-

      - name: Install Godot
        shell: bash
        run: |
          set -euo pipefail
          if [ ! -x ".tools/godot/Godot_v${GODOT_VERSION}_linux.x86_64" ]; then
            mkdir -p .tools/godot
            curl -fL "https://github.com/godotengine/godot-builds/releases/download/${GODOT_VERSION}/Godot_v${GODOT_VERSION}_linux.x86_64.zip" -o /tmp/godot.zip
            unzip -q /tmp/godot.zip -d .tools/godot
            chmod +x ".tools/godot/Godot_v${GODOT_VERSION}_linux.x86_64"
          fi

      - name: Import and prepare isolated shard
        shell: bash
        run: |
          GODOT=".tools/godot/Godot_v${GODOT_VERSION}_linux.x86_64"
          "${GODOT}" --headless --editor --path . --quit-after 1000
          "${GODOT}" --headless --path . --script res://tests/prepare_full_test_shard.gd

      - name: Run full shard with timing
        shell: bash
        env:
          SCRIPT_LIST: ${{ matrix.scripts }}
          FULL_TEST_SHARD: ${{ matrix.shard }}
        run: |
          set -euo pipefail
          GODOT=".tools/godot/Godot_v${GODOT_VERSION}_linux.x86_64"
          mkdir -p test-output/ci
          : > "test-output/ci/${FULL_TEST_SHARD}-timing.ndjson"
          IFS=',' read -ra SCRIPTS <<< "${SCRIPT_LIST}"
          for name in "${SCRIPTS[@]}"; do
            START="$(date +%s)"
            "${GODOT}" --headless --path . --script "res://tests/${name}"
            END="$(date +%s)"
            printf '{"suite":"%s","seconds":%d}\n' "${name}" "$((END-START))" >> "test-output/ci/${FULL_TEST_SHARD}-timing.ndjson"
          done

      - name: Nightly summary
        if: always()
        run: |
          echo "## ${{ matrix.shard }}" >> "${GITHUB_STEP_SUMMARY}"
          cat "test-output/ci/${{ matrix.shard }}-timing.ndjson" >> "${GITHUB_STEP_SUMMARY}" || true

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: Full-Test-${{ matrix.shard }}
          path: test-output/
          if-no-files-found: warn
          compression-level: 1
